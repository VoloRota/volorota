name: Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Test, build, and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Re-run tests before any push so a broken main never publishes ────
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Pre-pull Mailpit image (SMTP integration test)
        run: docker pull -q axllent/mailpit

      - name: Run tests
        run: bun test
        env:
          VOLOROTA_ADMIN_PASSWORD: ci-test-password

      # ── Docker build and push ─────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/volorota/volorota
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
